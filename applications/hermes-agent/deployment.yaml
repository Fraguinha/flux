apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes-agent
  labels:
    app: hermes-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      serviceAccountName: hermes-agent
      initContainers:
        - name: copy-config
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              cp /config/config.yaml /opt/data/config.yaml
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /config
      containers:
        - name: hermes-agent
          image: nousresearch/hermes-agent:latest
          args:
            - gateway
            - run
          env:
            - name: HERMES_DASHBOARD
              value: "1"
          envFrom:
            - secretRef:
                name: hermes-agent-secrets
          ports:
            - name: http
              containerPort: 9119
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /opt/data
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
        - name: config
          configMap:
            name: hermes-agent-config
