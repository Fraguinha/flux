apiVersion: apps/v1
kind: Deployment
metadata:
  name: signal-cli
  namespace: hermes-agent
  labels:
    app: signal-cli
spec:
  replicas: 1
  selector:
    matchLabels:
      app: signal-cli
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: signal-cli
    spec:
      containers:
        - name: signal-cli
          image: bbernhard/signal-cli-rest-api:latest
          env:
            - name: MODE
              value: json-rpc
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /home/.local/share/signal-cli
          readinessProbe:
            httpGet:
              path: /v1/about
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/about
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: signal-cli-data
