apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-hermes-agent
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  interval: 5m
  timeout: 30m
  path: ./applications/hermes-agent
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-longhorn
    - name: infra-cert-manager
    - name: infra-external-dns
    - name: infra-traefik
  patches:
    - patch: |
        - op: add
          path: /metadata/annotations/external-dns.alpha.kubernetes.io~1target
          value: ${PUBLIC_IPS}
        - op: add
          path: /spec/ingressClassName
          value: traefik
      target:
        kind: Ingress
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: external-dns-targets
        optional: true
