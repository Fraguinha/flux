apiVersion: v1
kind: ServiceAccount
metadata:
  name: pi-agent
  namespace: pi-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pi-agent-cluster-admin
subjects:
  - kind: ServiceAccount
    name: pi-agent
    namespace: pi-agent
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
