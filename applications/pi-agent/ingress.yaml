apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pi-agent
  namespace: pi-agent
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    external-dns.alpha.kubernetes.io/target: ${PUBLIC_IPS}
    traefik.ingress.kubernetes.io/router.middlewares: pi-agent-pi-agent-auth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: agent.fraguinha.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pi-agent
                port:
                  number: 7681
  tls:
    - hosts:
        - agent.fraguinha.com
      secretName: pi-agent-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pi-agent-auth
  namespace: pi-agent
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  ingressClassName: traefik
  rules:
    - host: agent.fraguinha.com
      http:
        paths:
          - path: /_auth
            pathType: Prefix
            backend:
              service:
                name: pi-agent-auth
                port:
                  number: 3000
  tls:
    - hosts:
        - agent.fraguinha.com
      secretName: pi-agent-tls
