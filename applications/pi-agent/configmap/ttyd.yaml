apiVersion: v1
kind: ConfigMap
metadata:
  name: pi-agent-ttyd
  namespace: pi-agent
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
      <meta name="mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-capable" content="yes">
      <title>pi</title>
      <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>π</text></svg>">
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
          height: 100dvh;
          overflow: hidden;
          overscroll-behavior: none;
          color-scheme: light dark;
          background: Canvas;
        }
        body {
          display: flex;
          flex-direction: column;
          padding-top: env(safe-area-inset-top);
        }
        #terminal-container {
          flex: 1 1 0%;
          min-height: 0;
          overflow: hidden;
          position: relative;
        }
        #terminal-container, #terminal-container * {
          touch-action: pan-y;
        }
        #terminal-container .xterm {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          padding: 4px;
        }
        #terminal-container .xterm-screen {
          pointer-events: none;
        }

        #toolbar {
          display: none;
          flex-direction: column;
          padding: 6px 4px calc(env(safe-area-inset-bottom) + 4px);
          gap: 4px;
          flex-shrink: 0;
        }
        .toolbar-row { display: flex; gap: 4px; justify-content: center; }
        #toolbar button {
          padding: 8px 10px;
          font-size: 13px;
          touch-action: manipulation;
          -webkit-tap-highlight-color: transparent;
          min-width: 40px;
          min-height: 36px;
        }
        @media (max-width: 768px) { #toolbar { display: flex; } }
        #status {
          display: none;
          position: fixed;
          top: calc(env(safe-area-inset-top) + 6px);
          left: 50%;
          transform: translateX(-50%);
          padding: 4px 12px;
          font-family: monospace;
          font-size: 12px;
          color: #fff;
          background: rgba(70, 70, 70, 0.92);
          border: 1px solid rgba(255, 255, 255, 0.18);
          border-radius: 12px;
          z-index: 100;
          pointer-events: none;
        }
      </style>
    </head>
    <body>
      <div id="terminal-container"></div>
      <div id="toolbar">
        <div class="toolbar-row">
          <button data-ctrl="l">^L</button>
          <button data-ctrl="t">^T</button>
          <button data-ctrl="o">^O</button>
          <button data-ctrl="c">^C</button>
          <button data-ctrl="d">^D</button>
          <button data-ctrl="a">^A</button>
          <button data-action="bottom">⤓</button>
          <button data-action="top">⤒</button>
          <button data-ctrl="e">^E</button>
        </div>
        <div class="toolbar-row">
          <button data-key="Escape">Esc</button>
          <button data-key="Tab">Tab</button>
          <button data-mod="ctrl" id="btn-ctrl">Ctrl</button>
          <button data-mod="alt" id="btn-alt">Alt</button>
          <button data-key="Enter">Ret</button>
          <button data-key="ArrowLeft">←</button>
          <button data-key="ArrowDown">↓</button>
          <button data-key="ArrowUp">↑</button>
          <button data-key="ArrowRight">→</button>
        </div>
      </div>
      <div id="status"></div>

      <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
      <script>
        (function() {
          var statusEl = document.getElementById('status');
          function showStatus(msg) { statusEl.textContent = msg; statusEl.style.display = 'block'; }
          function hideStatus() { statusEl.style.display = 'none'; }

          var term = new Terminal({
            fontSize: 15,
            fontFamily: "'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, Monaco, 'Courier New', monospace",
            cursorBlink: true,
            cursorStyle: 'bar',
            scrollback: 20000,
            allowProposedApi: true
          });

          var fitAddon = new FitAddon.FitAddon();
          term.loadAddon(fitAddon);
          var container = document.getElementById('terminal-container');
          term.open(container);

          var schemeMq = window.matchMedia('(prefers-color-scheme: dark)');
          function applyScheme() {
            term.options.theme = schemeMq.matches
              ? { background: '#000000', foreground: '#ffffff', cursor: '#ffffff' }
              : { background: '#ffffff', foreground: '#000000', cursor: '#000000' };
          }
          applyScheme();
          if (schemeMq.addEventListener) schemeMq.addEventListener('change', applyScheme);

          var fitTimer;
          var lastFitW = 0;
          var lastFitH = 0;
          function doFit() {
            if (window.visualViewport) {
              document.body.style.height = window.visualViewport.height + 'px';
            }
            var w = container.clientWidth;
            var h = container.clientHeight;
            if (lastFitW === 0 || w !== lastFitW || Math.abs(h - lastFitH) > 80) {
              lastFitW = w;
              lastFitH = h;
              try { fitAddon.fit(); } catch(e) {}
            }
          }
          function scheduleFit() {
            clearTimeout(fitTimer);
            fitTimer = setTimeout(doFit, 100);
          }
          window.addEventListener('resize', scheduleFit);
          if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', scheduleFit);
          }

          var ws = null;
          var reconnectTimer = null;
          var reconnectDelay = 500;
          var connecting = false;

          var wakeLock = null;
          function acquireWakeLock() {
            if (wakeLock || !('wakeLock' in navigator)) return;
            navigator.wakeLock.request('screen').then(function(wl) {
              wakeLock = wl;
              wl.addEventListener('release', function() { wakeLock = null; });
            }).catch(function() {});
          }

          function scheduleReconnect() {
            if (reconnectTimer) return;
            reconnectTimer = setTimeout(function() {
              reconnectTimer = null;
              connect();
            }, reconnectDelay);
            reconnectDelay = Math.min(reconnectDelay * 2, 5000);
          }

          function reconnectNow() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            reconnectDelay = 500;
            connect();
          }

          function connect() {
            if (connecting) return;
            if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;
            connecting = true;
            showStatus('Connecting…');
            fetch('/token')
              .then(function(r) {
                if (!r.ok) throw new Error('Token fetch failed: ' + r.status);
                return r.json();
              })
              .then(function(data) {
                var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(proto + '//' + location.host + '/ws?token=' + data.token, ['tty']);
                ws.binaryType = 'arraybuffer';
                var deviceId = localStorage.getItem('pi-device-id');
                if (!deviceId) {
                  deviceId = crypto.randomUUID().slice(0, 8);
                  localStorage.setItem('pi-device-id', deviceId);
                }
                var sentDeviceId = false;
                ws.onopen = function() {
                  connecting = false;
                  reconnectDelay = 500;
                  hideStatus();
                  acquireWakeLock();
                  try { fitAddon.fit(); } catch(e) {}
                  var cols = term.cols || 80;
                  var rows = term.rows || 24;
                  ws.send(JSON.stringify({ columns: cols, rows: rows }));
                };
                ws.onmessage = function(ev) {
                  var raw = new Uint8Array(ev.data);
                  var cmd = raw[0];
                  var payload = raw.slice(1);
                  if (cmd === 48) {
                    if (!sentDeviceId) {
                      var text = new TextDecoder().decode(payload);
                      if (text.indexOf('READY') !== -1) {
                        sentDeviceId = true;
                        sendInput(deviceId + '\r');
                        return;
                      }
                    }
                    term.write(payload);
                  } else if (cmd === 49) {
                    document.title = new TextDecoder().decode(payload) || 'pi';
                  }
                };
                ws.onclose = function() {
                  connecting = false;
                  showStatus('Reconnecting…');
                  scheduleReconnect();
                };
                ws.onerror = function() {};
              })
              .catch(function() {
                connecting = false;
                showStatus('Reconnecting…');
                scheduleReconnect();
              });
          }

          document.addEventListener('visibilitychange', function() {
            if (!document.hidden) { reconnectNow(); acquireWakeLock(); }
          });
          window.addEventListener('online', reconnectNow);
          window.addEventListener('focus', reconnectNow);

          function sendInput(data) {
            if (ws && ws.readyState === WebSocket.OPEN) ws.send('0' + data);
          }
          function sendResize(cols, rows) {
            if (ws && ws.readyState === WebSocket.OPEN && cols > 0 && rows > 0) ws.send('1' + JSON.stringify({ columns: cols, rows: rows }));
          }
          term.onData(function(data) { sendInput(data); });
          term.onResize(function(size) { sendResize(size.cols, size.rows); });

          var ctrlActive = false;
          var altActive = false;

          function handleButton(btn) {
            if (btn.dataset.mod === 'ctrl') { ctrlActive = !ctrlActive; document.getElementById('btn-ctrl').classList.toggle('mod-active', ctrlActive); return; }
            if (btn.dataset.mod === 'alt') { altActive = !altActive; document.getElementById('btn-alt').classList.toggle('mod-active', altActive); return; }
            if (btn.dataset.action === 'bottom') { term.scrollToBottom(); return; }
            if (btn.dataset.action === 'top') { term.scrollToTop(); return; }
            if (btn.dataset.ctrl) {
              if (altActive) sendInput('\x1b' + String.fromCharCode(btn.dataset.ctrl.charCodeAt(0) - 96));
              else sendInput(String.fromCharCode(btn.dataset.ctrl.charCodeAt(0) - 96));
            } else if (btn.dataset.key) {
              var seq = '';
              switch (btn.dataset.key) {
                case 'Escape': seq = '\x1b'; break;
                case 'Tab': seq = '\t'; break;
                case 'Enter': seq = '\r'; break;
                case 'ArrowUp': seq = '\x1b[A'; break;
                case 'ArrowDown': seq = '\x1b[B'; break;
                case 'ArrowRight': seq = '\x1b[C'; break;
                case 'ArrowLeft': seq = '\x1b[D'; break;
              }
              if (altActive && !seq.startsWith('\x1b[')) seq = '\x1b' + seq;
              sendInput(seq);
            }
            ctrlActive = false; altActive = false;
            document.getElementById('btn-ctrl').classList.remove('mod-active');
            document.getElementById('btn-alt').classList.remove('mod-active');
          }

          var toolbar = document.getElementById('toolbar');
          toolbar.addEventListener('pointerdown', function(e) { e.preventDefault(); });
          toolbar.addEventListener('click', function(e) {
            var btn = e.target.closest('button');
            if (btn) handleButton(btn);
          });

          container.addEventListener('click', function() { term.scrollToBottom(); term.focus(); acquireWakeLock(); });

          setTimeout(function() {
            scheduleFit();
            connect();
          }, 100);
          term.focus();
        })();
      </script>
    </body>
    </html>

  pi-session.sh: |
    #!/bin/sh
    printf 'READY\n'
    stty -echo
    read -r DEVICE_ID
    stty echo
    clear
    DEVICE_ID=$(printf "%s" "$DEVICE_ID" | tr -cd 'a-zA-Z0-9')
    [ -z "$DEVICE_ID" ] && DEVICE_ID="default"
    exec ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=yes -o UserKnownHostsFile=/root/.ssh/known_hosts -p 2222 -t root@pi-agent-tmux \
      "export PATH=/usr/local/bin:\$PATH; tmux -f /etc/tmux.conf has-session -t 'pi-$${DEVICE_ID}' 2>/dev/null && tmux -f /etc/tmux.conf capture-pane -e -p -S -20000 -t 'pi-$${DEVICE_ID}'; exec tmux -f /etc/tmux.conf -u new-session -A -s 'pi-$${DEVICE_ID}' 'pi'"
