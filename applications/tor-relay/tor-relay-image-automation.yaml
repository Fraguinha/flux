apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: tor-relay-image
  namespace: flux-system
spec:
  image: fraguinha/tor-relay
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: tor-relay-policy
  namespace: flux-system
spec:
  digestReflectionPolicy: Always
  interval: 5m
  imageRepositoryRef:
    name: tor-relay-image
  filterTags:
    pattern: '^latest$'
  policy:
    alphabetical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: tor-relay-update-automation
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: tor-relay-git
  git:
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
    push:
      branch: main
  update:
    path: ./k8s
