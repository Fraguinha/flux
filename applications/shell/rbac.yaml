apiVersion: v1
kind: ServiceAccount
metadata:
  name: shell
  namespace: shell
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: shell-cluster-admin
subjects:
  - kind: ServiceAccount
    name: shell
    namespace: shell
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
