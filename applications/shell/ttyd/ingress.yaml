apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shell
  namespace: shell
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    external-dns.alpha.kubernetes.io/target: ${PUBLIC_IPS}
    traefik.ingress.kubernetes.io/router.middlewares: shell-shell-auth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: shell.fraguinha.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shell
                port:
                  number: 7681
  tls:
    - hosts:
        - shell.fraguinha.com
      secretName: shell-tls
