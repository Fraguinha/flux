apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-shell
  namespace: flux-system
spec:
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  interval: 1m
  timeout: 30m
  path: ./applications/shell
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-longhorn
    - name: infra-cert-manager
    - name: infra-external-dns
    - name: infra-traefik
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: external-dns-targets
        optional: true
