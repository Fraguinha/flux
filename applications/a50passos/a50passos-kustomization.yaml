apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: a50passos
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s
  prune: true
  retryInterval: 3m0s
  sourceRef:
    kind: GitRepository
    name: a50passos-git
  targetNamespace: a50passos
  timeout: 3m0s
  wait: true
  dependsOn:
    - name: infra-external-dns
  patches:
    - patch: |
        - op: add
          path: /metadata/annotations/external-dns.alpha.kubernetes.io~1target
          value: ${PUBLIC_IPS}
      target:
        kind: Ingress
    - patch: |
        - op: add
          path: /spec/template/spec/affinity
          value:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io/control-plane
                        operator: DoesNotExist
      target:
        group: apps
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: external-dns-targets
