apiVersion: v1
kind: Namespace
metadata:
  name: a50passos
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-cpu-limit
  namespace: a50passos
spec:
  limits:
    - default:
        cpu: 1000m
        memory: 1Gi
      defaultRequest:
        cpu: 10m
        memory: 64Mi
      type: Container
