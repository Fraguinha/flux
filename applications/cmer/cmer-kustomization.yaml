apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cmer
  namespace: flux-system
spec:
  interval: 1m
  path: ./k8s
  prune: true
  retryInterval: 3m0s
  sourceRef:
    kind: GitRepository
    name: cmer-git
  targetNamespace: cmer
  timeout: 30m
  wait: true
  dependsOn:
    - name: infra-external-dns
    - name: infra-traefik
  patches:
    - patch: |
        - op: add
          path: /metadata/annotations/external-dns.alpha.kubernetes.io~1target
          value: ${PUBLIC_IPS}
        - op: add
          path: /spec/ingressClassName
          value: traefik
      target:
        kind: Ingress
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: external-dns-targets
        optional: true
