resources:
- gotk-components.yaml
- gotk-sync.yaml

patches:
  - patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: flux-system
        namespace: flux-system
      spec:
        decryption:
          provider: sops
          secretRef:
            name: sops-age
    target:
      kind: Kustomization
      name: flux-system
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: source-controller
        namespace: flux-system
      spec:
        template:
          spec:
            containers:
              - name: manager
                resources:
                  requests:
                    cpu: 10m
                    memory: 64Mi
                  limits:
                    memory: 512Mi
    target:
      kind: Deployment
      name: source-controller
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kustomize-controller
        namespace: flux-system
      spec:
        template:
          spec:
            containers:
              - name: manager
                args:
                  - --events-addr=http://notification-controller.$(RUNTIME_NAMESPACE).svc.cluster.local./
                  - --watch-all-namespaces=true
                  - --log-level=info
                  - --log-encoding=json
                  - --enable-leader-election
                  - --concurrent=10
                  - --requeue-dependency=5s
                resources:
                  requests:
                    cpu: 10m
                    memory: 64Mi
                  limits:
                    memory: 512Mi
    target:
      kind: Deployment
      name: kustomize-controller
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: helm-controller
        namespace: flux-system
      spec:
        template:
          spec:
            containers:
              - name: manager
                resources:
                  requests:
                    cpu: 10m
                    memory: 64Mi
                  limits:
                    memory: 512Mi
    target:
      kind: Deployment
      name: helm-controller
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: notification-controller
        namespace: flux-system
      spec:
        template:
          spec:
            containers:
              - name: manager
                resources:
                  requests:
                    cpu: 10m
                    memory: 32Mi
                  limits:
                    memory: 512Mi
    target:
      kind: Deployment
      name: notification-controller
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: image-reflector-controller
        namespace: flux-system
      spec:
        template:
          spec:
            containers:
              - name: manager
                resources:
                  requests:
                    cpu: 50m
                    memory: 48Mi
                  limits:
                    memory: 512Mi
    target:
      kind: Deployment
      name: image-reflector-controller
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: image-automation-controller
        namespace: flux-system
      spec:
        template:
          spec:
            containers:
              - name: manager
                resources:
                  requests:
                    cpu: 10m
                    memory: 48Mi
                  limits:
                    memory: 512Mi
    target:
      kind: Deployment
      name: image-automation-controller
