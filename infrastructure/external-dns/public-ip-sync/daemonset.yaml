apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: public-ip-annotator
  namespace: external-dns
spec:
  selector:
    matchLabels:
      app: public-ip-annotator
  template:
    metadata:
      labels:
        app: public-ip-annotator
    spec:
      serviceAccountName: public-ip-sync
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: annotator
          image: alpine/k8s:1.31.4
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                PUBLIC_IP=$(curl -sf https://ifconfig.me/ip)
                if [ -n "$PUBLIC_IP" ]; then
                  kubectl annotate node "$NODE_NAME" --overwrite \
                    "public-ip-sync/public-ip=$PUBLIC_IP"
                  echo "Annotated $NODE_NAME with public IP $PUBLIC_IP"
                else
                  echo "Failed to fetch public IP, will retry in 5m"
                fi
                sleep 300
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
