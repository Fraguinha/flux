apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: public-ip-sync
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: public-ip-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: public-ip-sync
subjects:
  - kind: ServiceAccount
    name: public-ip-sync
    namespace: external-dns
