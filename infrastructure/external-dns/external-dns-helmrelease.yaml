apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: flux-system
spec:
  interval: 5m
  releaseName: external-dns
  chart:
    spec:
      chart: external-dns
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  install:
    crds: CreateReplace
    createNamespace: true
  upgrade:
    crds: CreateReplace
  targetNamespace: external-dns
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              - op: add
                path: /spec/template/spec/affinity
                value:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: node-role.kubernetes.io/control-plane
                              operator: DoesNotExist
            target:
              group: apps
  values:
    podSecurityContext:
      runAsNonRoot: true
      fsGroup: 1000
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
    provider:
      name: webhook
      webhook:
        image:
          repository: fraguinha/ptisp-webhook-provider
          tag: latest
          pullPolicy: Always
        resources:
          requests:
            memory: 512Mi
          limits:
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          periodSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          periodSeconds: 10
          failureThreshold: 3
        env:
          - name: SERVER_PORT
            value: "8080"
          - name: PTISP_FRAGUINHA_EMAIL
            valueFrom:
              secretKeyRef:
                name: external-dns-secrets
                key: PTISP_FRAGUINHA_EMAIL
          - name: PTISP_FRAGUINHA_HASH
            valueFrom:
              secretKeyRef:
                name: external-dns-secrets
                key: PTISP_FRAGUINHA_HASH
          - name: PTISP_FRAGUINHA_DOMAINS
            valueFrom:
              secretKeyRef:
                name: external-dns-secrets
                key: PTISP_FRAGUINHA_DOMAINS
          - name: PTISP_A50PASSOS_EMAIL
            valueFrom:
              secretKeyRef:
                name: external-dns-secrets
                key: PTISP_A50PASSOS_EMAIL
          - name: PTISP_A50PASSOS_HASH
            valueFrom:
              secretKeyRef:
                name: external-dns-secrets
                key: PTISP_A50PASSOS_HASH
          - name: PTISP_A50PASSOS_DOMAINS
            valueFrom:
              secretKeyRef:
                name: external-dns-secrets
                key: PTISP_A50PASSOS_DOMAINS
          - name: PTISP_LIVINVICTA_EMAIL
            valueFrom:
              secretKeyRef:
                name: external-dns-secrets
                key: PTISP_LIVINVICTA_EMAIL
          - name: PTISP_LIVINVICTA_HASH
            valueFrom:
              secretKeyRef:
                name: external-dns-secrets
                key: PTISP_LIVINVICTA_HASH
          - name: PTISP_LIVINVICTA_DOMAINS
            valueFrom:
              secretKeyRef:
                name: external-dns-secrets
                key: PTISP_LIVINVICTA_DOMAINS
    extraArgs:
      - --webhook-provider-url=http://127.0.0.1:8080/
      - --txt-prefix=_edns.
      - --ingress-class=traefik
      - --no-resolve-service-load-balancer-hostname
    policy: sync
    sources:
      - ingress
    txtOwnerId: k8s-cluster

