apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-system-upgrade
  namespace: flux-system
spec:
  interval: 1m
  timeout: 10m
  path: ./infrastructure/system-upgrade
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: flux-system
