apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-helmrelease
  namespace: flux-system
spec:
  interval: 1m
  releaseName: cnpg
  storageNamespace: cnpg-system
  targetNamespace: cnpg-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
    timeout: 10m
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
    timeout: 10m
  chart:
    spec:
      chart: cloudnative-pg
      sourceRef:
        kind: HelmRepository
        name: cnpg
