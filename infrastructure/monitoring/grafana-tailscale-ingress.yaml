apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-tailscale-ingress
  namespace: monitoring
  annotations:
    tailscale.com/funnel: "false"
spec:
  ingressClassName: tailscale
  rules:
    - host: grafana.tail9a2f1c.ts.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vms-grafana
                port:
                  number: 80
  tls:
    - hosts:
        - grafana.tail9a2f1c.ts.net
