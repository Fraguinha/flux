apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kafka-helmrelease
  namespace: flux-system
spec:
  install:
    crds: CreateReplace
    remediation:
      retries: 3
    createNamespace: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: strimzi-kafka-operator
      version: ">=0.40.0"
      sourceRef:
        kind: HelmRepository
        name: strimzi
        namespace: flux-system
  interval: 1h0m0s
  releaseName: kafka
  storageNamespace: kafka
  targetNamespace: kafka
