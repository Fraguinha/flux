apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kured
  namespace: flux-system
spec:
  interval: 5m
  releaseName: kured
  targetNamespace: kured
  chart:
    spec:
      chart: kured
      sourceRef:
        kind: HelmRepository
        name: kured
  values:
    configuration:
      rebootSentinelFile: /var/run/reboot-required
      period: 1h
      rebootDays: [mo, tu, we, th, fr, sa, su]
      startTime: "02:00"
      endTime: "06:00"
      concurrency: 1
