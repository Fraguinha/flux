apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio-operator
  namespace: flux-system
spec:
  install:
    crds: CreateReplace
    remediation:
      retries: 3
    createNamespace: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: operator
      version: '7.0.0'
      sourceRef:
        kind: HelmRepository
        name: minio-operator
        namespace: flux-system
  interval: 1h0m0s
  releaseName: minio
  storageNamespace: minio
  targetNamespace: minio
