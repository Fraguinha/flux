apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  install:
    crds: CreateReplace
    remediation:
      retries: 3
    timeout: 30m
    createNamespace: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
    timeout: 30m
  chart:
    spec:
      chart: cert-manager
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: cert-manager
  interval: 1m
  releaseName: cert-manager
  storageNamespace: cert-manager
  targetNamespace: cert-manager
  values:
    extraArgs:
      - --acme-http01-solver-nameservers=1.1.1.1:53,1.0.0.1:53
