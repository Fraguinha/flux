apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-tailscale-config
  namespace: flux-system
spec:
  interval: 1m
  timeout: 10m
  path: ./infrastructure/tailscale/config
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infra-tailscale
