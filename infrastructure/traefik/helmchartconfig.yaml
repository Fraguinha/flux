apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    deployment:
      kind: DaemonSet
    updateStrategy:
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    ports:
      web:
        hostPort: 80
      websecure:
        hostPort: 443
